<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boba Shop</title>
    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: bisque;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            background-color: white;
        }

        #top-text {
            text-align: center;
            color: #8B4513;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            padding: 20px;
            font-size: 52px;
            font-weight: bold;
            background-color: white; /* make top section white */
            margin: 0;
        }

        nav {
            background-color: white;
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 10px 0;
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        nav ul li a {
            text-decoration: none;
            color: #8B4513;
            font-weight: bold;
            font-size: 20px;
        }

        nav ul li a:hover {
            color: #d2691e;
        }

        section {
            padding: 50px 20px;
            text-align: center;
        }
        section#menu img {
    display: block;
    margin: 10px auto;
    max-width: 200px; 
    border-radius: 10px; 
        }
    </style>
</head>
<body>

<header>
    <h1 id="top-text">Welcome to Boba Shop</h1>
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#menu">Menu</a></li>
            <li><a href="#contact">Contact</a></li>

    </nav>
